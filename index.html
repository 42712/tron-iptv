<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>TRON IPTV</title>
<style>
*{box-sizing:border-box;margin:0;padding:0}
html,body{height:100%;background:#07111a;color:#d0e8f5;font-family:'Segoe UI',system-ui,sans-serif;overflow:hidden}
body{display:flex;align-items:center;justify-content:center}
.bg{position:fixed;inset:0;background:radial-gradient(ellipse at 20% 50%,rgba(0,150,200,.07) 0%,transparent 60%),radial-gradient(ellipse at 80% 20%,rgba(0,100,180,.05) 0%,transparent 50%);pointer-events:none}
.grid-bg{position:fixed;inset:0;background-image:linear-gradient(rgba(0,200,255,.03) 1px,transparent 1px),linear-gradient(90deg,rgba(0,200,255,.03) 1px,transparent 1px);background-size:48px 48px;pointer-events:none}
.card{position:relative;z-index:10;width:400px;max-width:95vw;background:#0d1e2d;border:1px solid #1a4060;padding:44px 40px 36px;box-shadow:0 0 60px rgba(0,150,200,.1),0 0 0 1px rgba(0,200,255,.05)}
.card::before,.card::after{content:'';position:absolute;width:20px;height:20px;border-color:#00c8ff;border-style:solid}
.card::before{top:-1px;left:-1px;border-width:2px 0 0 2px}
.card::after{bottom:-1px;right:-1px;border-width:0 2px 2px 0}
.logo-wrap{text-align:center;margin-bottom:36px}
.logo-icon{display:flex;align-items:center;justify-content:center;gap:10px;margin-bottom:12px}
.logo-text{font-size:40px;font-weight:900;letter-spacing:8px;color:#00c8ff;text-shadow:0 0 30px rgba(0,200,255,.5)}
.logo-text span{color:#3a6a88;font-weight:300}
.logo-sub{font-size:11px;letter-spacing:4px;color:#3a6a88}
.field{margin-bottom:14px}
.label{display:block;font-size:10px;font-weight:700;letter-spacing:3px;color:#3a7a98;text-transform:uppercase;margin-bottom:6px}
.inp-wrap{position:relative}
.inp-wrap input{width:100%;background:#050f18;border:1px solid #1a3a52;color:#d0e8f5;padding:11px 14px 11px 38px;font-size:13px;outline:none;transition:.2s;font-family:inherit}
.inp-wrap input:focus{border-color:#00c8ff;box-shadow:0 0 0 1px #00c8ff,0 0 14px rgba(0,200,255,.1)}
.inp-wrap input::placeholder{color:#1a3a50}
.ico{position:absolute;left:12px;top:50%;transform:translateY(-50%);font-size:14px;opacity:.4;pointer-events:none}
.eye{position:absolute;right:10px;top:50%;transform:translateY(-50%);background:none;border:none;cursor:pointer;font-size:15px;color:#3a6a88;padding:4px}
.eye:hover{color:#00c8ff}
.remember{display:flex;align-items:center;gap:8px;margin:4px 0 20px}
.remember input{accent-color:#00c8ff;width:14px;height:14px;cursor:pointer}
.remember label{font-size:12px;color:#3a6a88;cursor:pointer;letter-spacing:.5px}
.btn{width:100%;padding:13px;background:transparent;border:1px solid #00c8ff;color:#00c8ff;font-size:15px;font-weight:700;letter-spacing:4px;text-transform:uppercase;cursor:pointer;position:relative;overflow:hidden;transition:color .3s}
.btn::before{content:'';position:absolute;inset:0;background:#00c8ff;transform:scaleX(0);transform-origin:left;transition:transform .3s;z-index:0}
.btn:hover::before{transform:scaleX(1)}
.btn:hover{color:#07111a}
.btn span{position:relative;z-index:1}
.btn:disabled{opacity:.5;cursor:not-allowed}
.btn:disabled::before{display:none}
.err{margin-top:12px;padding:10px 14px;background:rgba(255,60,80,.08);border:1px solid rgba(255,60,80,.3);color:#ff4455;font-size:12px;text-align:center;display:none;letter-spacing:.5px}
</style>
</head>
<body>
<div class="bg"></div>
<div class="grid-bg"></div>
<div class="card">
  <div class="logo-wrap">
    <div class="logo-icon">
      <svg width="36" height="36" viewBox="0 0 36 36"><polygon points="18,2 34,10 34,26 18,34 2,26 2,10" fill="none" stroke="#00c8ff" stroke-width="1.5"/><polygon points="18,8 28,13 28,23 18,28 8,23 8,13" fill="rgba(0,200,255,.08)" stroke="#00c8ff" stroke-width="1"/><text x="18" y="21" text-anchor="middle" fill="#00c8ff" font-size="10" font-weight="bold" font-family="Arial">TV</text></svg>
      <div class="logo-text">TRON<span>IPTV</span></div>
    </div>
    <div class="logo-sub">XTREAM CODES PLAYER</div>
  </div>
  <div class="field">
    <label class="label" for="s">Servidor</label>
    <div class="inp-wrap"><span class="ico">🌐</span><input id="s" type="url" placeholder="http://servidor:porta" autocomplete="off" spellcheck="false"></div>
  </div>
  <div class="field">
    <label class="label" for="u">Usuário</label>
    <div class="inp-wrap"><span class="ico">👤</span><input id="u" type="text" placeholder="seu usuário" autocomplete="off" spellcheck="false"></div>
  </div>
  <div class="field">
    <label class="label" for="p">Senha</label>
    <div class="inp-wrap"><span class="ico">🔑</span><input id="p" type="password" placeholder="sua senha"><button class="eye" onclick="togglePw()" type="button">👁</button></div>
  </div>
  <div class="remember"><input type="checkbox" id="rem" checked><label for="rem">Lembrar credenciais</label></div>
  <button class="btn" id="btn" onclick="login()"><span id="btn-txt">▶  ENTRAR</span></button>
  <div class="err" id="err"></div>
</div>
<script>
(function(){
  try{
    const s=JSON.parse(localStorage.getItem('tron_s')||'null');
    if(s){document.getElementById('s').value=s.sv||'';document.getElementById('u').value=s.us||'';document.getElementById('p').value=s.pw||'';}
  }catch(_){}
})();
function togglePw(){const p=document.getElementById('p');p.type=p.type==='password'?'text':'password';}
function showErr(m){const e=document.getElementById('err');e.textContent=m;e.style.display='block';setTimeout(()=>e.style.display='none',4000);}
function login(){
  const sv=document.getElementById('s').value.trim().replace(/\/$/,'');
  const us=document.getElementById('u').value.trim();
  const pw=document.getElementById('p').value;
  const rem=document.getElementById('rem').checked;
  if(!sv)return showErr('Informe a URL do servidor');
  if(!us)return showErr('Informe o usuário');
  if(!pw)return showErr('Informe a senha');
  const d={sv,us,pw};
  if(rem){localStorage.setItem('tron_s',JSON.stringify(d));}
  else{sessionStorage.setItem('tron_s',JSON.stringify(d));localStorage.removeItem('tron_s');}
  const btn=document.getElementById('btn');btn.disabled=true;
  document.getElementById('btn-txt').textContent='⏳  CONECTANDO...';
  setTimeout(()=>window.location.href='app.html',350);
}
document.addEventListener('keydown',e=>{if(e.key==='Enter'&&e.target.tagName!=='BUTTON')login();});
</script>
</body>
</html>
