<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>TRON IPTV</title>
<script src="https://cdn.jsdelivr.net/npm/hls.js@latest"></script>
<style>
*{box-sizing:border-box;margin:0;padding:0}
html,body{height:100%;overflow:hidden;background:#07111c;color:#c5dff0;font-family:'Segoe UI',sans-serif;font-size:13px}
:root{
  --bg:#07111c;--bg2:#0b1927;--bg3:#0e1f2f;--bg4:#081421;
  --act:#0a7aa8;--actd:#085f82;--c:#00c8ff;
  --bdr:#173348;--bdr2:#1c4060;
  --td:#3a6880;--tdm:#1a3245;
  --acc:#ff3a52;--gold:#ffc030;--grn:#00d060;
  --H:52px;--N:42px;
}

/* TOPBAR */
#bar{position:fixed;inset:0 0 auto 0;height:var(--H);z-index:500;display:flex;align-items:center;padding:0 14px;gap:10px;background:var(--bg2);border-bottom:2px solid var(--act)}
.logo{display:flex;align-items:center;gap:8px;cursor:pointer;flex-shrink:0}
.logo-t{font-size:18px;font-weight:900;letter-spacing:2px;color:var(--c)}
.logo-t b{color:var(--td);font-weight:300}
#mbadge{padding:2px 10px;background:var(--act);color:#fff;font-size:10px;font-weight:800;letter-spacing:2px;flex-shrink:0}
#clk{flex:1;text-align:center;font-size:13px;color:#6a9ab5;letter-spacing:1px}
.ibtn{background:none;border:none;color:var(--td);cursor:pointer;padding:7px;display:flex;align-items:center;border-radius:4px;transition:.15s}
.ibtn:hover{color:var(--c);background:rgba(0,200,255,.1)}
.ibtn svg{width:19px;height:19px;stroke:currentColor;fill:none;stroke-width:2;stroke-linecap:round;stroke-linejoin:round}

/* SEARCH */
#sbar{position:fixed;top:var(--H);inset-inline:0;z-index:499;display:none;align-items:center;gap:8px;padding:8px 14px;background:var(--bg3);border-bottom:1px solid var(--bdr2)}
#sbar input{flex:1;background:var(--bg);border:1px solid var(--bdr2);color:#d0e8f5;padding:8px 14px;font-size:14px;outline:none}
#sbar input:focus{border-color:var(--c)}
#sbar input::placeholder{color:var(--tdm)}
#sbar .xbtn{background:none;border:1px solid var(--bdr);color:var(--td);padding:6px 14px;cursor:pointer;font-size:14px}

/* NAV */
#nav{position:fixed;top:var(--H);inset-inline:0;height:var(--N);z-index:498;display:flex;align-items:center;padding:0 10px;background:var(--bg3);border-bottom:1px solid var(--bdr)}
.ntab{padding:8px 18px;background:none;border:none;border-bottom:3px solid transparent;margin-bottom:-1px;color:var(--td);font-size:13px;font-weight:700;letter-spacing:1px;cursor:pointer;transition:.15s;white-space:nowrap}
.ntab:hover{color:#d0e8f5}
.ntab.on{color:var(--c);border-bottom-color:var(--c)}

/* WORKSPACE */
#ws{position:fixed;top:calc(var(--H) + var(--N));inset-inline:0;bottom:0;overflow:hidden}

/* ===== TELA CATEGORIAS ===== */
#vc{position:absolute;inset:0;display:flex;flex-direction:column;background:var(--bg)}
.vc-hd{padding:10px 16px;font-size:10px;font-weight:800;letter-spacing:3px;color:var(--c);background:var(--bg3);border-bottom:1px solid var(--bdr);flex-shrink:0}
#cgrid{
  flex:1;overflow-y:auto;padding:14px;
  display:grid;grid-template-columns:repeat(auto-fill,minmax(200px,1fr));gap:10px;
}
#cgrid::-webkit-scrollbar{width:4px}
#cgrid::-webkit-scrollbar-thumb{background:var(--bdr)}
.ccard{display:flex;align-items:center;justify-content:space-between;gap:8px;padding:14px 16px;cursor:pointer;background:var(--bg3);border:1px solid var(--bdr);border-left:3px solid transparent;transition:.15s}
.ccard:hover{background:rgba(13,58,90,.4);border-left-color:var(--c)}
.ccard-n{font-size:14px;font-weight:700}
.ccard-c{background:var(--act);color:#fff;font-size:11px;font-weight:800;padding:2px 10px;border-radius:20px;flex-shrink:0}

/* ===== TELA PLAYER (3 colunas) ===== */
#vp{position:absolute;inset:0;display:none}
/* usa CSS grid para 3 colunas lado a lado */
#vp{display:none;grid-template-columns:300px 1fr 220px;grid-template-rows:100%}

/* COL 1: lista de canais */
#ccol{display:flex;flex-direction:column;background:var(--bg4);border-right:1px solid var(--bdr2);overflow:hidden;height:100%}
#cch{display:flex;align-items:center;gap:4px;padding:8px 10px;background:var(--bg2);border-bottom:1px solid var(--bdr2);flex-shrink:0}
.arr{background:none;border:none;color:var(--c);font-size:24px;cursor:pointer;padding:0 4px;line-height:1;flex-shrink:0}
.arr:hover{color:#fff}
#cname{flex:1;font-size:13px;font-weight:800;text-align:center;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
#csw{padding:6px 10px;background:var(--bg2);border-bottom:1px solid var(--bdr);flex-shrink:0}
#csi{width:100%;background:var(--bg);border:1px solid var(--bdr);color:#d0e8f5;padding:6px 10px;font-size:12px;outline:none}
#csi:focus{border-color:var(--c)}
#csi::placeholder{color:var(--tdm)}
#clist{flex:1;overflow-y:auto}
#clist::-webkit-scrollbar{width:4px}
#clist::-webkit-scrollbar-thumb{background:var(--bdr)}

/* item canal */
.ci{display:flex;align-items:center;gap:8px;padding:8px 10px;cursor:pointer;border-bottom:1px solid rgba(23,51,72,.6);border-left:3px solid transparent;transition:.1s}
.ci:hover{background:rgba(13,54,82,.4)}
.ci.on{background:var(--act);border-left-color:var(--c)}
.ci-n{font-size:11px;color:var(--td);min-width:26px;text-align:right;flex-shrink:0}
.ci.on .ci-n{color:rgba(255,255,255,.6)}
.ci-logo{width:44px;height:30px;flex-shrink:0;background:var(--bg);border-radius:3px;overflow:hidden;display:flex;align-items:center;justify-content:center;font-size:17px}
.ci-logo img{width:100%;height:100%;object-fit:contain;display:block}
.ci-info{flex:1;min-width:0}
.ci-name{font-size:13px;font-weight:600;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.ci-sub{font-size:10px;color:var(--td);margin-top:1px;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.ci.on .ci-name,.ci.on .ci-sub{color:#fff}
.ci.on .ci-sub{opacity:.65}
.ci-r{display:flex;align-items:center;gap:4px;flex-shrink:0}
.ldot{width:6px;height:6px;border-radius:50%;background:var(--acc);animation:bk 1.8s infinite}
@keyframes bk{0%,100%{opacity:1}50%{opacity:.1}}
.fb{background:none;border:none;cursor:pointer;font-size:12px;color:var(--tdm);padding:2px;transition:.12s}
.fb:hover{color:var(--gold);transform:scale(1.2)}
.fb.on{color:var(--gold)}

/* COL 2: player */
#pcol{display:flex;flex-direction:column;background:var(--bg);overflow:hidden}
#pbox{position:relative;background:#000;flex-shrink:0;width:100%;aspect-ratio:16/9;max-height:57vh}
#pbox video{width:100%;height:100%;display:block}
#pidl{position:absolute;inset:0;display:flex;flex-direction:column;align-items:center;justify-content:center;gap:12px;background:var(--bg2)}
.irow{display:flex;align-items:center;gap:10px}
.itxt{font-size:21px;font-weight:900;letter-spacing:3px;color:var(--c)}
.itxt b{color:var(--td);font-weight:300}
#pidl p{font-size:10px;letter-spacing:3px;color:var(--tdm)}

/* qualidade */
#qbar{display:flex;align-items:center;gap:5px;padding:6px 12px;flex-shrink:0;background:var(--bg2);border-top:1px solid var(--bdr)}
.ql{font-size:9px;font-weight:800;letter-spacing:2px;color:var(--td);flex-shrink:0}
.qb{padding:3px 10px;background:var(--bg);border:1px solid var(--bdr);color:var(--td);font-size:10px;font-weight:800;cursor:pointer;transition:.12s}
.qb:hover{border-color:var(--c);color:var(--c)}
.qb.on{background:var(--act);border-color:var(--c);color:#fff}
#qfs{margin-left:auto;padding:3px 10px;background:none;border:1px solid var(--c);color:var(--c);font-size:10px;font-weight:800;cursor:pointer;transition:.12s}
#qfs:hover{background:var(--c);color:#000}

/* episódios */
#epp{flex-shrink:0;max-height:185px;background:var(--bg2);border-top:1px solid var(--bdr);display:none;flex-direction:column}
#eph{display:flex;align-items:center;justify-content:space-between;padding:7px 12px;border-bottom:1px solid var(--bdr);flex-shrink:0}
#ept{font-size:12px;font-weight:700;color:var(--c);flex:1;overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
#epc{background:none;border:1px solid var(--bdr);color:var(--td);padding:2px 8px;cursor:pointer;font-size:11px;flex-shrink:0;margin-left:8px}
#epc:hover{border-color:var(--acc);color:var(--acc)}
#epss{display:flex;gap:4px;padding:5px 10px;overflow-x:auto;flex-shrink:0;border-bottom:1px solid var(--bdr)}
#epss::-webkit-scrollbar{display:none}
.sea{padding:3px 10px;background:none;border:1px solid var(--bdr);color:var(--td);font-size:11px;font-weight:700;cursor:pointer;white-space:nowrap;transition:.12s}
.sea.on{border-color:var(--c);color:var(--c);background:rgba(0,200,255,.07)}
#eprl{flex:1;overflow-y:auto}
#eprl::-webkit-scrollbar{width:3px}
#eprl::-webkit-scrollbar-thumb{background:var(--bdr)}
.epr{display:flex;align-items:center;gap:8px;padding:6px 12px;border-bottom:1px solid rgba(23,51,72,.4);cursor:pointer;transition:.1s}
.epr:hover{background:rgba(13,54,82,.4)}
.epr.on{background:var(--act);border-left:2px solid var(--c)}
.epn{font-size:10px;color:var(--td);width:24px;flex-shrink:0}
.epnm{font-size:12px;font-weight:600;flex:1}
.epd{font-size:10px;color:var(--td)}

/* COL 3: info */
#icol{display:flex;flex-direction:column;gap:10px;background:var(--bg3);border-left:1px solid var(--bdr2);padding:16px 14px;overflow-y:auto}
#icol::-webkit-scrollbar{width:3px}
#icol::-webkit-scrollbar-thumb{background:var(--bdr)}
#ibadge{display:inline-block;align-self:flex-start;padding:3px 10px;background:var(--act);color:#fff;font-size:10px;font-weight:800;letter-spacing:2px}
#iname{font-size:17px;font-weight:900;line-height:1.2;color:#fff}
#igroup{font-size:11px;color:var(--c);font-weight:700;letter-spacing:1px}
#ithumb{width:100%;aspect-ratio:16/9;background:var(--bg);overflow:hidden;border-radius:2px;display:none}
#ithumb img{width:100%;height:100%;object-fit:cover}
#idesc{font-size:11px;color:var(--td);line-height:1.6}

/* ESTADOS */
.stb{display:flex;flex-direction:column;align-items:center;justify-content:center;gap:10px;padding:50px 20px;color:var(--td);text-align:center;grid-column:1/-1}
.stb .ico{font-size:30px;opacity:.2}
.stb p{font-size:11px;letter-spacing:2px}
.spin{width:28px;height:28px;border:2px solid var(--bdr);border-top-color:var(--c);border-radius:50%;animation:sp .7s linear infinite}
@keyframes sp{to{transform:rotate(360deg)}}

/* TOAST */
#toast{position:fixed;bottom:16px;right:16px;z-index:9999;pointer-events:none;background:var(--bg3);border-left:3px solid var(--c);color:#d0e8f5;padding:9px 16px;font-size:12px;letter-spacing:.5px;transform:translateY(50px);opacity:0;transition:.25s}
#toast.show{transform:none;opacity:1}
#toast.err{border-color:var(--acc);color:var(--acc)}
#toast.ok{border-color:var(--grn);color:var(--grn)}

/* MOBILE */
@media(max-width:700px){
  html,body{overflow:auto;height:auto}
  #ws{position:static;overflow:visible;height:auto}
  #vc,#vp{position:static}
  #vp{grid-template-columns:1fr!important;grid-template-rows:auto}
  #ccol{max-height:260px;border-right:none;border-bottom:1px solid var(--bdr2)}
  #icol{border-left:none;border-top:1px solid var(--bdr)}
  #pbox{max-height:none}
  #clk{display:none}
}
</style>
</head>
<body>

<div id="bar">
  <div class="logo" onclick="goHome()">
    <svg width="26" height="26" viewBox="0 0 26 26" fill="none">
      <polygon points="13,2 24,7.5 24,18.5 13,24 2,18.5 2,7.5" fill="none" stroke="#00c8ff" stroke-width="1.5"/>
      <polygon points="13,6 20,10 20,16 13,20 6,16 6,10" fill="rgba(0,200,255,.1)" stroke="#00c8ff" stroke-width="1"/>
      <text x="13" y="17" text-anchor="middle" fill="#00c8ff" font-size="7" font-weight="bold" font-family="Arial">TV</text>
    </svg>
    <span class="logo-t">TRON<b>IPTV</b></span>
  </div>
  <div id="mbadge">AO VIVO</div>
  <div id="clk"></div>
  <button class="ibtn" onclick="toggleS()">
    <svg viewBox="0 0 24 24"><circle cx="11" cy="11" r="8"/><line x1="21" y1="21" x2="16.65" y2="16.65"/></svg>
  </button>
  <button class="ibtn" onclick="sair()">
    <svg viewBox="0 0 24 24"><path d="M9 21H5a2 2 0 01-2-2V5a2 2 0 012-2h4"/><polyline points="16 17 21 12 16 7"/><line x1="21" y1="12" x2="9" y2="12"/></svg>
  </button>
</div>

<div id="sbar">
  <input id="sinp" type="text" placeholder="🔍 Buscar canais, filmes ou séries..." oninput="gSearch(this.value)">
  <button class="xbtn" onclick="toggleS()">✕</button>
</div>

<nav id="nav">
  <button class="ntab on" data-s="live"   onclick="goNav('live')">📺 AO VIVO</button>
  <button class="ntab"    data-s="movies" onclick="goNav('movies')">🎬 FILMES</button>
  <button class="ntab"    data-s="series" onclick="goNav('series')">📂 SÉRIES</button>
  <button class="ntab"    data-s="favs"   onclick="goNav('favs')">⭐ FAVORITOS</button>
</nav>

<div id="ws">

  <!-- TELA 1: grade de categorias -->
  <div id="vc">
    <div class="vc-hd">SELECIONE UMA CATEGORIA</div>
    <div id="cgrid">
      <div class="stb"><div class="spin"></div><p>CARREGANDO...</p></div>
    </div>
  </div>

  <!-- TELA 2: player 3 colunas -->
  <div id="vp">

    <!-- col 1 -->
    <div id="ccol">
      <div id="cch">
        <button class="arr" onclick="prevC()">&#8249;</button>
        <span id="cname">CATEGORIA</span>
        <button class="arr" onclick="nextC()">&#8250;</button>
      </div>
      <div id="csw"><input id="csi" type="text" placeholder="🔍 Buscar..." oninput="fItems(this.value)"></div>
      <div id="clist"></div>
    </div>

    <!-- col 2 -->
    <div id="pcol">
      <div id="pbox">
        <video id="vid" controls autoplay playsinline></video>
        <div id="pidl">
          <div class="irow">
            <svg width="36" height="36" viewBox="0 0 26 26" fill="none">
              <polygon points="13,2 24,7.5 24,18.5 13,24 2,18.5 2,7.5" fill="none" stroke="#00c8ff" stroke-width="1.5"/>
              <polygon points="13,6 20,10 20,16 13,20 6,16 6,10" fill="rgba(0,200,255,.1)" stroke="#00c8ff" stroke-width="1"/>
              <text x="13" y="17" text-anchor="middle" fill="#00c8ff" font-size="7" font-weight="bold" font-family="Arial">TV</text>
            </svg>
            <span class="itxt">TRON<b>IPTV</b></span>
          </div>
          <p>SELECIONE UM CANAL PARA ASSISTIR</p>
        </div>
      </div>
      <div id="qbar">
        <span class="ql">QUALIDADE</span>
        <button class="qb on" onclick="setQ('auto',this)">AUTO</button>
        <button class="qb"    onclick="setQ('sd',this)">SD</button>
        <button class="qb"    onclick="setQ('hd',this)">HD</button>
        <button class="qb"    onclick="setQ('fhd',this)">FULL HD</button>
        <button id="qfs" onclick="goFull()">⛶ TELA CHEIA</button>
      </div>
      <div id="epp">
        <div id="eph"><span id="ept"></span><button id="epc" onclick="closeEp()">✕ Fechar</button></div>
        <div id="epss"></div>
        <div id="eprl"></div>
      </div>
    </div>

    <!-- col 3 -->
    <div id="icol">
      <div id="ibadge">AO VIVO</div>
      <div id="iname">—</div>
      <div id="igroup"></div>
      <div id="ithumb"></div>
      <div id="idesc"></div>
    </div>

  </div>
</div>

<div id="toast"></div>

<script>
'use strict';
// SESSÃO
const SS=(()=>{try{return JSON.parse(localStorage.getItem('tron_s')||'null')||JSON.parse(sessionStorage.getItem('tron_s')||'null');}catch{return null;}})();
if(!SS?.sv) location.replace('index.html');
const {sv,us,pw}=SS;

// PROXIES
const PX=[
  u=>u,
  u=>`https://api.allorigins.win/raw?url=${encodeURIComponent(u)}`,
  u=>`https://corsproxy.io/?url=${encodeURIComponent(u)}`,
  u=>`https://api.cors.lol/?url=${encodeURIComponent(u)}`,
];
let bpx=0;
async function api(action,extra=''){
  const raw=`${sv}/player_api.php?username=${us}&password=${pw}&action=${action}${extra}`;
  const ord=[bpx,...[0,1,2,3].filter(i=>i!==bpx)];
  for(const i of ord){
    try{
      const r=await fetch(PX[i](raw),{signal:AbortSignal.timeout(14000)});
      if(!r.ok) continue;
      const t=await r.text();
      if(!t?.trim()) continue;
      const d=JSON.parse(t);
      bpx=i; return d;
    }catch(e){console.warn('px'+i,e.message);}
  }
  throw new Error('Servidor inacessível. Verifique URL e credenciais.');
}

// ESTADO
let sec='live',cats=[],streams=[],vcats=[];
let cidx=-1,citems=[],curl=null;
let HLS=null,rtr=0,qm='auto',sOpen=false;

// INIT
addEventListener('DOMContentLoaded',()=>{
  const cl=document.getElementById('clk');
  (function tk(){const n=new Date();cl.textContent=n.toLocaleTimeString('pt-BR',{hour:'2-digit',minute:'2-digit'})+' · '+n.toLocaleDateString('pt-BR',{day:'2-digit',month:'short'});setTimeout(tk,1000);})();
  goNav('live');
});

// TOAST
function toast(m,c=''){const el=document.getElementById('toast');el.textContent=m;el.className='toast show '+c;clearTimeout(el._t);el._t=setTimeout(()=>el.className='toast',3000);}

// FAVS
const gF=()=>{try{return JSON.parse(localStorage.getItem('tf')||'[]');}catch{return[];}};
const sF=a=>localStorage.setItem('tf',JSON.stringify(a));
const isF=id=>gF().some(x=>x._id===id);
function togF(item){let f=gF(),i=f.findIndex(x=>x._id===item._id);if(i>=0){f.splice(i,1);sF(f);toast('Removido','err');return false;}f.push(item);sF(f);toast('⭐ Adicionado!','ok');return true;}

// SEARCH BAR
function toggleS(){
  sOpen=!sOpen;
  document.getElementById('sbar').style.display=sOpen?'flex':'none';
  const sh=sOpen?46:0;
  document.getElementById('nav').style.top=(52+sh)+'px';
  document.getElementById('ws').style.top=(52+42+sh)+'px';
  if(sOpen){const i=document.getElementById('sinp');i.value='';i.focus();}
}
function gSearch(q){
  q=q.trim();
  if(!q){goHome();return;}
  const r=streams.filter(s=>s.name.toLowerCase().includes(q.toLowerCase()));
  document.getElementById('cname').textContent=`"${q}" — ${r.length}`;
  citems=r;cidx=-1;
  goPlay();rItems(r);
}

// NAV
function goNav(s){
  sec=s;
  document.querySelectorAll('.ntab').forEach(b=>b.classList.toggle('on',b.dataset.s===s));
  document.getElementById('mbadge').textContent={live:'AO VIVO',movies:'FILMES',series:'SÉRIES',favs:'FAVORITOS'}[s];
  closeEp();
  s==='favs'?loadFavs():loadSec(s);
}
function goHome(){document.getElementById('vc').style.display='flex';document.getElementById('vp').style.display='none';}
function goPlay(){document.getElementById('vc').style.display='none';document.getElementById('vp').style.display='grid';}

// CARREGA SEÇÃO
async function loadSec(s){
  goHome();
  document.getElementById('cgrid').innerHTML='<div class="stb"><div class="spin"></div><p>CARREGANDO...</p></div>';
  try{
    const m={live:['get_live_categories','get_live_streams'],movies:['get_vod_categories','get_vod_streams'],series:['get_series_categories','get_series']};
    const [ca,sa]=m[s];
    const [cr,sr]=await Promise.all([api(ca),api(sa)]);
    cats=Array.isArray(cr)?cr:[];
    streams=mkStreams(sr,s);
    vcats=cats.filter(c=>streams.some(st=>st.cat===String(c.category_id)));
    rCats();
    toast(`✅ ${streams.length} itens`,'ok');
  }catch(e){
    document.getElementById('cgrid').innerHTML=`<div class="stb"><div class="ico">⚠️</div><p>${x(e.message)}</p></div>`;
    toast(e.message,'err');
  }
}

// BUILD STREAMS — URLs corretas para cada tipo
function mkStreams(raw,s){
  if(!Array.isArray(raw)) return [];
  if(s==='live') return raw.map((c,i)=>({
    _id:'l_'+c.stream_id, num:i+1, type:'live',
    name:c.name||'—',
    // URL HLS para canais ao vivo
    url:`${sv}/live/${us}/${pw}/${c.stream_id}.m3u8`,
    img:c.stream_icon||'', cat:String(c.category_id||''), grp:c.category_name||'',
  }));
  if(s==='movies') return raw.map((m,i)=>({
    _id:'m_'+m.stream_id, num:i+1, type:'movie',
    name:m.name||'—',
    // Filmes: tenta mp4/mkv direto (não m3u8)
    url:`${sv}/movie/${us}/${pw}/${m.stream_id}.${m.container_extension||'mp4'}`,
    // URL alternativa em m3u8 para players compatíveis
    urlm3u8:`${sv}/movie/${us}/${pw}/${m.stream_id}.m3u8`,
    img:m.stream_icon||'', cat:String(m.category_id||''), grp:m.category_name||'',
  }));
  return raw.map((x,i)=>({
    _id:'sr_'+x.series_id, num:i+1, type:'series',
    name:x.name||'—', url:null,
    img:x.cover||'', cat:String(x.category_id||''), grp:x.category_name||'',
    sid:x.series_id,
  }));
}

// RENDER CATEGORIAS
function rCats(){
  const g=document.getElementById('cgrid');g.innerHTML='';
  const f=document.createDocumentFragment();
  const all=mCard('TODOS',streams.length);all.onclick=()=>openCat(-1,streams,'TODOS');f.appendChild(all);
  vcats.forEach((c,i)=>{
    const items=streams.filter(s=>s.cat===String(c.category_id));
    if(!items.length) return;
    const card=mCard(c.category_name||'—',items.length);
    card.onclick=()=>openCat(i,items,c.category_name||'—');
    f.appendChild(card);
  });
  g.appendChild(f);
}
function mCard(name,count){
  const d=document.createElement('div');d.className='ccard';
  d.innerHTML=`<span class="ccard-n">${x(name)}</span><span class="ccard-c">${count}</span>`;
  return d;
}

// ABRIR CATEGORIA
function openCat(idx,items,name){
  cidx=idx;citems=items;
  goPlay();
  document.getElementById('cname').textContent=name;
  document.getElementById('csi').value='';
  rItems(items);
}
function prevC(){if(cidx<=0)return;cidx--;const c=vcats[cidx];openCat(cidx,streams.filter(s=>s.cat===String(c.category_id)),c.category_name||'—');}
function nextC(){if(cidx>=vcats.length-1)return;cidx++;const c=vcats[cidx];openCat(cidx,streams.filter(s=>s.cat===String(c.category_id)),c.category_name||'—');}
function fItems(q){const lq=q.toLowerCase();rItems(lq?citems.filter(i=>i.name.toLowerCase().includes(lq)):citems);}

// RENDER LISTA
function rItems(list){
  const el=document.getElementById('clist');el.innerHTML='';
  if(!list.length){el.innerHTML='<div class="stb"><div class="ico">🔍</div><p>NENHUM ITEM</p></div>';return;}
  const live=sec==='live',ser=sec==='series';
  const f=document.createDocumentFragment();
  list.forEach((item,i)=>{
    const d=document.createElement('div');
    d.className='ci'+(curl===item.url?' on':'');
    d.dataset.id=item._id;
    const ico=live?'📺':ser?'📂':'🎬';
    d.innerHTML=`
      <span class="ci-n">${item.num||i+1}</span>
      <div class="ci-logo">${item.img?`<img src="${x(item.img)}" loading="lazy" onerror="this.style.display='none'">`:`<span>${ico}</span>`}</div>
      <div class="ci-info">
        <div class="ci-name">${x(item.name)}</div>
        <div class="ci-sub">${live?'Ao vivo':x(item.grp||'')}</div>
      </div>
      <div class="ci-r">
        ${live?'<div class="ldot"></div>':''}
        <button class="fb ${isF(item._id)?'on':''}" onclick="hFav(event,'${x(item._id)}')">⭐</button>
      </div>`;
    d.addEventListener('click',e=>{
      if(e.target.classList.contains('fb'))return;
      if(ser){openSeries(item);return;}
      document.querySelectorAll('.ci').forEach(z=>z.classList.remove('on'));
      d.classList.add('on');
      doPlay(item);
    });
    f.appendChild(d);
  });
  el.appendChild(f);
}
function hFav(e,id){
  e.stopPropagation();
  const item=streams.find(i=>i._id===id)||gF().find(f=>f._id===id);
  if(!item)return;
  const on=togF(item);e.currentTarget.classList.toggle('on',on);
  if(sec==='favs')loadFavs();
}

// PLAYER
function doPlay(item){
  curl=item.url;
  document.getElementById('ibadge').textContent=item.type==='live'?'AO VIVO':item.type==='movie'?'FILME':'SÉRIE';
  document.getElementById('iname').textContent=item.name;
  document.getElementById('igroup').textContent=item.grp||'';
  document.getElementById('idesc').textContent='';
  const th=document.getElementById('ithumb');
  if(item.img&&item.type!=='live'){th.style.display='block';th.innerHTML=`<img src="${x(item.img)}" onerror="this.parentElement.style.display='none'">`;}
  else th.style.display='none';
  startPlay(item.url, item.name, item.type==='live', item.urlm3u8||null);
}

function startPlay(url, name, isLive, altUrl){
  rtr=0;
  const v=document.getElementById('vid');
  document.getElementById('pidl').style.display='none';
  if(HLS){HLS.destroy();HLS=null;}

  // Filmes: tenta direto primeiro, se falhar tenta m3u8
  function tryDirect(){
    v.src=url;
    v.load();
    v.play().catch(()=>{
      // se falhar e tiver url m3u8 alternativa, tenta
      if(altUrl && Hls.isSupported()){
        tryHls(altUrl);
      }
    });
    v.onerror=()=>{
      if(altUrl && Hls.isSupported()){tryHls(altUrl);}
      else{ toast('Formato não suportado neste browser','err'); }
    };
  }

  function tryHls(hlsUrl){
    if(HLS){HLS.destroy();HLS=null;}
    HLS=new Hls({enableWorker:true});
    HLS.loadSource(hlsUrl);
    HLS.attachMedia(v);
    HLS.on(Hls.Events.MANIFEST_PARSED,(_,d)=>{applyQ(HLS,d.levels);v.play().catch(()=>{});});
    HLS.on(Hls.Events.ERROR,(_,d)=>{
      if(d.fatal&&curl===url){
        rtr++;
        if(rtr<=4){toast(`Reconectando ${rtr}/4…`,'err');setTimeout(()=>tryHls(hlsUrl),rtr*2500);}
        else toast('Stream indisponível','err');
      }
    });
  }

  if(isLive){
    // Canais ao vivo: sempre HLS
    if(Hls.isSupported()) tryHls(url);
    else if(v.canPlayType('application/vnd.apple.mpegurl')){v.src=url;v.play().catch(()=>{});}
    else{v.src=url;v.play().catch(()=>{});}
  } else {
    // Filmes/séries: tenta direto, fallback m3u8
    if(url.endsWith('.m3u8') && Hls.isSupported()){
      tryHls(url);
    } else {
      tryDirect();
    }
  }
}

function applyQ(h,lvls){
  if(!lvls?.length||qm==='auto'){h.currentLevel=-1;return;}
  const s=[...lvls].map((l,i)=>({i,h:l.height||0})).sort((a,b)=>a.h-b.h);
  if(qm==='sd')h.currentLevel=s[0]?.i??-1;
  else if(qm==='hd')h.currentLevel=(s.find(l=>l.h>=720)||s[Math.floor(s.length/2)])?.i??-1;
  else h.currentLevel=(s.find(l=>l.h>=1080)||s[s.length-1])?.i??-1;
}
function setQ(q,btn){qm=q;document.querySelectorAll('.qb').forEach(b=>b.classList.remove('on'));btn.classList.add('on');if(HLS)applyQ(HLS,HLS.levels);toast('Qualidade: '+q.toUpperCase());}
function goFull(){const v=document.getElementById('vid');(v.requestFullscreen||v.webkitRequestFullscreen||v.mozRequestFullScreen).call(v);}

// SÉRIES
async function openSeries(item){
  document.querySelectorAll('.ci').forEach(z=>z.classList.remove('on'));
  document.querySelector(`.ci[data-id="${item._id}"]`)?.classList.add('on');
  document.getElementById('ibadge').textContent='SÉRIE';
  document.getElementById('iname').textContent=item.name;
  document.getElementById('igroup').textContent=item.grp||'';
  const th=document.getElementById('ithumb');
  if(item.img){th.style.display='block';th.innerHTML=`<img src="${x(item.img)}" onerror="this.parentElement.style.display='none'">`;}
  else th.style.display='none';
  document.getElementById('ept').textContent=item.name;
  document.getElementById('epss').innerHTML='<div class="spin" style="margin:6px 14px"></div>';
  document.getElementById('eprl').innerHTML='';
  document.getElementById('epp').style.display='flex';
  try{
    const d=await api('get_series_info','&series_id='+item.sid);
    const ep=d.episodes||{};
    if(d.info?.plot)document.getElementById('idesc').textContent=d.info.plot;
    const ss=Object.keys(ep).sort((a,b)=>+a-+b);
    const sel=document.getElementById('epss');sel.innerHTML='';
    if(!ss.length){document.getElementById('eprl').innerHTML='<div class="stb"><p>SEM EPISÓDIOS</p></div>';return;}
    ss.forEach((s,i)=>{
      const b=document.createElement('button');b.className='sea'+(i===0?' on':'');b.textContent='Temp. '+s;
      b.onclick=()=>{document.querySelectorAll('.sea').forEach(z=>z.classList.remove('on'));b.classList.add('on');rEps(ep[s],item.name);};
      sel.appendChild(b);
    });
    rEps(ep[ss[0]],item.name);
  }catch(e){document.getElementById('eprl').innerHTML=`<div class="stb"><p>${x(e.message)}</p></div>`;}
}
function rEps(eps,sname){
  const el=document.getElementById('eprl');el.innerHTML='';
  if(!eps?.length){el.innerHTML='<div class="stb"><p>VAZIO</p></div>';return;}
  const f=document.createDocumentFragment();
  eps.forEach(ep=>{
    const url=`${sv}/series/${us}/${pw}/${ep.id}.${ep.container_extension||'mkv'}`;
    const d=document.createElement('div');
    d.className='epr'+(curl===url?' on':'');
    d.innerHTML=`<span class="epn">E${ep.episode_num}</span><span class="epnm">${x(ep.title||'Ep.'+ep.episode_num)}</span>${ep.info?.duration?`<span class="epd">${x(ep.info.duration)}</span>`:''}`;
    d.onclick=()=>{
      document.querySelectorAll('.epr').forEach(z=>z.classList.remove('on'));
      d.classList.add('on');curl=url;
      document.getElementById('iname').textContent=sname+' · E'+ep.episode_num;
      document.getElementById('idesc').textContent=ep.info?.plot||'';
      startPlay(url,sname+' E'+ep.episode_num,false,null);
    };
    f.appendChild(d);
  });
  el.appendChild(f);
}
function closeEp(){document.getElementById('epp').style.display='none';}

// FAVORITOS
function loadFavs(){
  const f=gF();streams=f;cats=[];vcats=[];
  goPlay();
  document.getElementById('cname').textContent='⭐ FAVORITOS';
  citems=f;cidx=-1;rItems(f);
}

// LOGOUT
function sair(){localStorage.removeItem('tron_s');sessionStorage.removeItem('tron_s');if(HLS)HLS.destroy();location.href='index.html';}

// ESCAPE
function x(s){return String(s||'').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');}

document.addEventListener('keydown',e=>{
  if(e.target.tagName==='INPUT')return;
  if(e.key===' '){const v=document.getElementById('vid');if(v.src){e.preventDefault();v.paused?v.play():v.pause();}}
  if(e.key==='f'||e.key==='F')goFull();
  if(e.key==='Escape'){closeEp();if(sOpen)toggleS();}
  if(e.key==='ArrowLeft')prevC();
  if(e.key==='ArrowRight')nextC();
});
</script>
