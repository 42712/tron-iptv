```html
<!DOCTYPE html>
<html lang="pt">
<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>IPTV Web Player</title>

<link rel="stylesheet" href="style.css">

<script src="https://cdn.jsdelivr.net/npm/hls.js@latest"></script>

</head>

<body>

<div id="loginBox">

<h2>IPTV Login</h2>

<input id="server" placeholder="http://servidor:porta">

<input id="user" placeholder="Usuário">

<div class="passwordBox">
<input id="pass" type="password" placeholder="Senha">
<button onclick="togglePassword()">👁</button>
</div>

<button class="loginBtn" onclick="login()">Entrar</button>

</div>

<div id="app">

<div class="sidebar">

<h3>Menu</h3>

<div onclick="loadLive()">📺 Canais</div>
<div onclick="loadMovies()">🎬 Filmes</div>
<div onclick="loadSeries()">📺 Séries</div>

</div>

<div class="main">

<video id="video" controls autoplay></video>

<input id="search" placeholder="Buscar..." onkeyup="searchItem()">

<div id="list"></div>

</div>

</div>

<script src="api.js"></script>
<script src="player.js"></script>

</body>
</html>
```
