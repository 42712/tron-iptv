```html
<!DOCTYPE html>
<html lang="pt">

<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1">

<title>Tron IPTV</title>

<link rel="stylesheet" href="style.css">

<link rel="manifest" href="manifest.json">

<script src="https://cdn.jsdelivr.net/npm/hls.js@latest"></script>

</head>

<body>

<div id="login">

<h2>Tron IPTV Login</h2>

<input id="server" placeholder="http://servidor:porta">

<input id="user" placeholder="Usuário">

<div class="passbox">
<input id="pass" type="password" placeholder="Senha">
<button onclick="togglePass()">👁</button>
</div>

<button onclick="login()">Entrar</button>

</div>


<div id="app">

<header>

<h1>TRON IPTV</h1>

<input id="search" placeholder="Buscar..." onkeyup="search()">

</header>

<video id="video" controls autoplay></video>

<div class="menu">

<button onclick="live()">📺 Canais</button>
<button onclick="movies()">🎬 Filmes</button>
<button onclick="series()">📂 Séries</button>
<button onclick="favorites()">⭐ Favoritos</button>

</div>

<div id="grid"></div>

</div>

<script src="app.js"></script>

</body>

</html>
```
