<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>TRON IPTV</title>
<link rel="stylesheet" href="style.css">
<script src="https://cdn.jsdelivr.net/npm/hls.js@latest"></script>
</head>
<body>

<header class="bar">
  <div class="logo">TRON<em>IPTV</em></div>
  <nav class="tabs">
    <button class="tab active" data-s="live"   onclick="navTo('live')">📺 Canais</button>
    <button class="tab"        data-s="movies" onclick="navTo('movies')">🎬 Filmes</button>
    <button class="tab"        data-s="series" onclick="navTo('series')">📂 Séries</button>
    <button class="tab"        data-s="favs"   onclick="navTo('favs')">⭐ Favoritos</button>
  </nav>
  <div class="bar-right">
    <input id="srch" type="text" placeholder="🔍 Buscar..." oninput="doSearch(this.value)">
    <button class="btn-out" onclick="doLogout()">Sair</button>
  </div>
</header>

<div class="workspace">

  <!-- COL 1: categorias -->
  <div class="col col-cats" id="col-cats">
    <div class="col-head">CATEGORIAS</div>
    <div class="col-body" id="cat-list"></div>
  </div>

  <!-- COL 2: itens -->
  <div class="col col-items" id="col-items">
    <div class="col-head" id="items-head">SELECIONE UMA CATEGORIA</div>
    <div class="col-body" id="item-list"></div>
  </div>

  <!-- COL 3: player -->
  <div class="col col-player">
    <div class="player-wrap">
      <video id="video" controls autoplay playsinline></video>
      <div class="idle" id="idle">
        <span>▶</span>
        <p>Selecione um canal</p>
      </div>
      <div class="pip" id="pip" style="display:none">
        <div class="pip-name" id="pip-name"></div>
        <div class="pip-live" id="pip-live"></div>
      </div>
    </div>

    <!-- painel episódios -->
    <div class="ep-wrap" id="ep-wrap" style="display:none">
      <div class="ep-top">
        <span class="ep-title" id="ep-title"></span>
        <button onclick="closeEp()">✕</button>
      </div>
      <div class="seasons" id="seasons"></div>
      <div class="ep-list" id="ep-list"></div>
    </div>

    <div class="now" id="now" style="display:none">
      <div class="now-n" id="now-n"></div>
      <div class="now-g" id="now-g"></div>
    </div>
  </div>

</div>

<div class="toast" id="toast"></div>
<script src="app.js"></script>
</body>
</html>
