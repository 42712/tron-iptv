<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>TRON IPTV</title>
<link rel="stylesheet" href="style.css">
<script src="https://cdn.jsdelivr.net/npm/hls.js@latest"></script>
</head>
<body>

<!-- TOPBAR -->
<header class="bar">
  <div class="bar-left">
    <div class="logo">
      <svg width="28" height="28" viewBox="0 0 28 28" fill="none">
        <polygon points="14,2 26,8 26,20 14,26 2,20 2,8" fill="none" stroke="#00c8ff" stroke-width="1.5"/>
        <polygon points="14,6 22,10 22,18 14,22 6,18 6,10" fill="rgba(0,200,255,0.12)" stroke="#00c8ff" stroke-width="1"/>
        <text x="14" y="17" text-anchor="middle" fill="#00c8ff" font-size="8" font-weight="bold" font-family="Arial">TV</text>
      </svg>
      <div class="logo-text">TRON<span>IPTV</span></div>
    </div>
    <div class="bar-mode" id="bar-mode">AO VIVO</div>
  </div>

  <div class="bar-clock" id="bar-clock"></div>

  <div class="bar-right">
    <button class="icon-btn" onclick="toggleSearch()" title="Buscar">
      <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="11" cy="11" r="8"/><line x1="21" y1="21" x2="16.65" y2="16.65"/></svg>
    </button>
    <button class="icon-btn" onclick="doLogout()" title="Sair">
      <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M9 21H5a2 2 0 01-2-2V5a2 2 0 012-2h4"/><polyline points="16 17 21 12 16 7"/><line x1="21" y1="12" x2="9" y2="12"/></svg>
    </button>
  </div>
</header>

<!-- SEARCH BAR (hidden by default) -->
<div class="search-bar" id="search-bar" style="display:none">
  <input id="srch" type="text" placeholder="Buscar canais, filmes ou séries..." oninput="doSearch(this.value)" autofocus>
  <button onclick="toggleSearch()">✕</button>
</div>

<!-- SECTION TABS -->
<nav class="nav-tabs">
  <button class="ntab active" data-s="live"   onclick="navTo('live')">📺 AO VIVO</button>
  <button class="ntab"        data-s="movies" onclick="navTo('movies')">🎬 FILMES</button>
  <button class="ntab"        data-s="series" onclick="navTo('series')">📂 SÉRIES</button>
  <button class="ntab"        data-s="favs"   onclick="navTo('favs')">⭐ FAVORITOS</button>
</nav>

<!-- WORKSPACE -->
<div class="workspace" id="workspace">

  <!-- HOME / CATEGORIA SELECTOR (primeiro estado) -->
  <div class="home-panel" id="home-panel">
    <div class="home-title" id="home-title">SELECIONE UMA CATEGORIA</div>
    <div class="cat-grid" id="cat-grid"></div>
  </div>

  <!-- PLAYER VIEW (quando canal selecionado) -->
  <div class="player-view" id="player-view" style="display:none">

    <!-- COL ESQUERDA: lista de canais -->
    <div class="ch-col">
      <div class="ch-col-head">
        <button class="ch-back" onclick="backToCats()">‹</button>
        <span class="ch-cat-name" id="ch-cat-name">CATEGORIA</span>
        <button class="ch-fwd" onclick="nextCat()">›</button>
      </div>
      <div class="ch-search-wrap">
        <input class="ch-search" id="ch-search" type="text" placeholder="🔍 Buscar..." oninput="filterItems(this.value)">
      </div>
      <div class="ch-list" id="ch-list"></div>
    </div>

    <!-- COL CENTRO: player -->
    <div class="mid-col">
      <div class="player-box">
        <video id="video" controls autoplay playsinline></video>
        <div class="idle" id="idle">
          <div class="idle-logo">
            <svg width="48" height="48" viewBox="0 0 28 28" fill="none">
              <polygon points="14,2 26,8 26,20 14,26 2,20 2,8" fill="none" stroke="#00c8ff" stroke-width="1.5"/>
              <polygon points="14,6 22,10 22,18 14,22 6,18 6,10" fill="rgba(0,200,255,0.1)" stroke="#00c8ff" stroke-width="1"/>
              <text x="14" y="17" text-anchor="middle" fill="#00c8ff" font-size="8" font-weight="bold" font-family="Arial">TV</text>
            </svg>
            <div class="idle-brand">TRON<span>IPTV</span></div>
          </div>
          <p>Selecione um canal para assistir</p>
        </div>
      </div>

      <!-- barra de qualidade -->
      <div class="q-bar" id="q-bar">
        <span class="q-label">QUALIDADE</span>
        <button class="q-btn active" id="q-auto" onclick="setQ('auto',this)">AUTO</button>
        <button class="q-btn" id="q-sd"   onclick="setQ('sd',this)">SD</button>
        <button class="q-btn" id="q-hd"   onclick="setQ('hd',this)">HD</button>
        <button class="q-btn" id="q-fhd"  onclick="setQ('fhd',this)">FULL HD</button>
        <button class="q-fs"  onclick="goFull()">⛶ TELA CHEIA</button>
      </div>

      <!-- episódios (séries) -->
      <div class="ep-box" id="ep-box" style="display:none">
        <div class="ep-box-head">
          <span id="ep-box-title"></span>
          <button onclick="closeEp()">✕</button>
        </div>
        <div class="ep-seasons" id="ep-seasons"></div>
        <div class="ep-rows" id="ep-rows"></div>
      </div>
    </div>

    <!-- COL DIREITA: info -->
    <div class="info-col" id="info-col">
      <div class="info-badge" id="info-badge">AO VIVO</div>
      <div class="info-name" id="info-name">—</div>
      <div class="info-group" id="info-group"></div>
      <div class="info-thumb" id="info-thumb"></div>
      <div class="info-desc" id="info-desc"></div>
    </div>

  </div>
</div>

<div class="toast" id="toast"></div>
<script src="app.js"></script>
</body>
</html>
