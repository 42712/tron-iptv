<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>TRON IPTV</title>
<script src="https://cdn.jsdelivr.net/npm/hls.js@latest"></script>
<style>
*{box-sizing:border-box;margin:0;padding:0}
html,body{height:100%;overflow:hidden;background:#09131e;color:#c8e2f0;font-family:'Segoe UI',system-ui,sans-serif;font-size:13px}
:root{--bg:#09131e;--bg2:#0d1c2a;--bg3:#101f30;--bg4:#0b1825;--sel:#0d3650;--act:#0b6d96;--c:#00c8ff;--bdr:#1a3d58;--bdr2:#1e4a65;--t:#c8e2f0;--td:#3d6f8a;--tdm:#234055;--acc:#ff3d55;--gold:#ffc840;--grn:#00d870;--H:52px;--N:42px}
#bar{position:fixed;inset:0 0 auto 0;height:var(--H);z-index:300;display:flex;align-items:center;padding:0 14px;gap:10px;background:var(--bg2);border-bottom:2px solid var(--act)}
.logo{display:flex;align-items:center;gap:8px;cursor:pointer;flex-shrink:0}
.logo-t{font-size:18px;font-weight:900;letter-spacing:2px;color:var(--c)}
.logo-t b{color:var(--td);font-weight:300}
#bar-mode{padding:3px 10px;background:var(--act);color:#fff;font-size:10px;font-weight:800;letter-spacing:2px;flex-shrink:0}
#clock{flex:1;text-align:center;font-size:14px;font-weight:600;letter-spacing:1px}
.ibtn{background:none;border:none;color:var(--td);cursor:pointer;padding:7px;border-radius:4px;display:flex;align-items:center;transition:.15s}
.ibtn:hover{color:var(--c);background:rgba(0,200,255,.1)}
.ibtn svg{width:19px;height:19px;stroke:currentColor;fill:none;stroke-width:2;stroke-linecap:round;stroke-linejoin:round}
#sbar{position:fixed;top:var(--H);inset-inline:0;z-index:299;display:none;align-items:center;gap:8px;padding:8px 14px;background:var(--bg3);border-bottom:1px solid var(--bdr2)}
#sbar input{flex:1;background:var(--bg);border:1px solid var(--bdr2);color:var(--t);padding:8px 14px;font-size:14px;outline:none}
#sbar input:focus{border-color:var(--c)}
#sbar input::placeholder{color:var(--tdm)}
#sbar button{background:none;border:1px solid var(--bdr);color:var(--td);padding:6px 12px;cursor:pointer;font-size:15px}
#sbar button:hover{color:var(--acc)}
#nav{position:fixed;top:var(--H);inset-inline:0;height:var(--N);z-index:298;display:flex;align-items:center;padding:0 12px;background:var(--bg3);border-bottom:1px solid var(--bdr)}
.tab{padding:8px 20px;background:none;border:none;border-bottom:3px solid transparent;margin-bottom:-1px;color:var(--td);font-size:13px;font-weight:700;letter-spacing:1px;cursor:pointer;transition:.15s;white-space:nowrap}
.tab:hover{color:var(--t)}
.tab.on{color:var(--c);border-bottom-color:var(--c)}
#ws{position:fixed;top:calc(var(--H) + var(--N));inset-inline:0;bottom:0;overflow:hidden}
/* TELA CATEGORIAS */
#v-cats{position:absolute;inset:0;display:flex;flex-direction:column;background:var(--bg)}
.vch{padding:10px 18px;font-size:10px;font-weight:800;letter-spacing:3px;color:var(--c);background:var(--bg3);border-bottom:1px solid var(--bdr);flex-shrink:0}
#cat-grid{flex:1;overflow-y:auto;padding:14px;display:grid;grid-template-columns:repeat(auto-fill,minmax(210px,1fr));gap:10px}
#cat-grid::-webkit-scrollbar{width:4px}
#cat-grid::-webkit-scrollbar-thumb{background:var(--bdr)}
.ccard{background:var(--bg3);border:1px solid var(--bdr);border-left:3px solid transparent;padding:15px 16px;cursor:pointer;transition:.15s;display:flex;align-items:center;justify-content:space-between;gap:8px}
.ccard:hover{background:var(--sel);border-left-color:var(--c)}
.ccard-n{font-size:14px;font-weight:700;flex:1}
.ccard-c{background:var(--act);color:#fff;font-size:11px;font-weight:800;padding:2px 10px;border-radius:20px;flex-shrink:0}
/* TELA PLAYER */
#v-play{position:absolute;inset:0;display:none;flex-direction:row}
/* col esquerda */
#col-ch{width:310px;flex-shrink:0;display:flex;flex-direction:column;background:var(--bg4);border-right:1px solid var(--bdr2);overflow:hidden}
#chead{display:flex;align-items:center;padding:8px 10px;gap:4px;background:var(--bg2);border-bottom:1px solid var(--bdr2);flex-shrink:0}
.narr{background:none;border:none;color:var(--c);font-size:24px;line-height:1;cursor:pointer;padding:0 5px}
.narr:hover{color:#fff}
#chead-name{flex:1;font-size:13px;font-weight:800;text-align:center;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
#csrch-wrap{padding:7px 10px;background:var(--bg2);border-bottom:1px solid var(--bdr);flex-shrink:0}
#csrch{width:100%;background:var(--bg);border:1px solid var(--bdr);color:var(--t);padding:6px 10px;font-size:12px;outline:none}
#csrch:focus{border-color:var(--c)}
#csrch::placeholder{color:var(--tdm)}
#chlist{flex:1;overflow-y:auto;overflow-x:hidden}
#chlist::-webkit-scrollbar{width:4px}
#chlist::-webkit-scrollbar-thumb{background:var(--bdr)}
.ci{display:flex;align-items:center;gap:9px;padding:8px 10px;cursor:pointer;border-bottom:1px solid rgba(26,61,88,.5);border-left:3px solid transparent;transition:.1s}
.ci:hover{background:var(--sel)}
.ci.on{background:var(--act);border-left-color:var(--c)}
.ci-n{font-size:11px;color:var(--td);min-width:28px;text-align:right;flex-shrink:0}
.ci.on .ci-n{color:rgba(255,255,255,.6)}
.ci-logo{width:46px;height:30px;flex-shrink:0;background:var(--bg);border-radius:3px;overflow:hidden;display:flex;align-items:center;justify-content:center;font-size:18px}
.ci-logo img{width:100%;height:100%;object-fit:contain}
.ci-info{flex:1;min-width:0}
.ci-name{font-size:13px;font-weight:600;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.ci-sub{font-size:10px;color:var(--td);margin-top:1px;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.ci.on .ci-name{color:#fff}
.ci.on .ci-sub{color:rgba(255,255,255,.5)}
.ci-r{display:flex;align-items:center;gap:4px;flex-shrink:0}
.ldot{width:6px;height:6px;border-radius:50%;background:var(--acc);animation:bk 1.8s infinite}
@keyframes bk{0%,100%{opacity:1}50%{opacity:.15}}
.fvb{background:none;border:none;cursor:pointer;font-size:12px;color:var(--tdm);padding:3px;transition:.12s}
.fvb:hover{color:var(--gold);transform:scale(1.2)}
.fvb.on{color:var(--gold)}
/* col centro */
#col-mid{flex:1;display:flex;flex-direction:column;background:var(--bg);overflow:hidden;min-width:0}
#pbox{position:relative;background:#000;flex-shrink:0;aspect-ratio:16/9;max-height:56vh;width:100%}
#pbox video{width:100%;height:100%;display:block}
#idle{position:absolute;inset:0;display:flex;flex-direction:column;align-items:center;justify-content:center;gap:12px;background:var(--bg2)}
.idle-brand{display:flex;align-items:center;gap:10px}
.idle-bt{font-size:22px;font-weight:900;letter-spacing:3px;color:var(--c)}
.idle-bt b{color:var(--td);font-weight:300}
#idle p{font-size:10px;letter-spacing:3px;color:var(--tdm)}
#qbar{display:flex;align-items:center;gap:5px;padding:6px 12px;flex-shrink:0;background:var(--bg2);border-top:1px solid var(--bdr)}
.qlbl{font-size:9px;font-weight:800;letter-spacing:2px;color:var(--td);flex-shrink:0}
.qb{padding:3px 11px;background:var(--bg);border:1px solid var(--bdr);color:var(--td);font-size:10px;font-weight:800;cursor:pointer;transition:.12s}
.qb:hover{border-color:var(--c);color:var(--c)}
.qb.on{background:var(--act);border-color:var(--c);color:#fff}
#qfs{margin-left:auto;padding:3px 11px;background:none;border:1px solid var(--c);color:var(--c);font-size:10px;font-weight:800;cursor:pointer;transition:.12s}
#qfs:hover{background:var(--c);color:#000}
#eppanel{flex-shrink:0;max-height:185px;background:var(--bg2);border-top:1px solid var(--bdr);display:none;flex-direction:column}
#ephead{display:flex;align-items:center;justify-content:space-between;padding:7px 12px;border-bottom:1px solid var(--bdr);flex-shrink:0}
#eptitle{font-size:12px;font-weight:700;color:var(--c);flex:1;overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
#epclose{background:none;border:1px solid var(--bdr);color:var(--td);padding:2px 8px;cursor:pointer;font-size:11px;flex-shrink:0;margin-left:8px}
#epclose:hover{border-color:var(--acc);color:var(--acc)}
#epseasons{display:flex;gap:4px;padding:5px 10px;overflow-x:auto;flex-shrink:0;border-bottom:1px solid var(--bdr)}
#epseasons::-webkit-scrollbar{display:none}
.seabtn{padding:3px 10px;background:none;border:1px solid var(--bdr);color:var(--td);font-size:11px;font-weight:700;cursor:pointer;transition:.12s;white-space:nowrap}
.seabtn.on{border-color:var(--c);color:var(--c);background:rgba(0,200,255,.07)}
#eplist{flex:1;overflow-y:auto}
#eplist::-webkit-scrollbar{width:3px}
#eplist::-webkit-scrollbar-thumb{background:var(--bdr)}
.eprow{display:flex;align-items:center;gap:8px;padding:6px 12px;border-bottom:1px solid rgba(26,61,88,.4);cursor:pointer;transition:.1s}
.eprow:hover{background:var(--sel)}
.eprow.on{background:var(--act);border-left:2px solid var(--c)}
.epn{font-size:10px;color:var(--td);width:24px;flex-shrink:0}
.epname{font-size:12px;font-weight:600;flex:1}
.epdur{font-size:10px;color:var(--td)}
/* col info */
#col-info{width:230px;flex-shrink:0;display:flex;flex-direction:column;gap:10px;background:var(--bg3);border-left:1px solid var(--bdr2);padding:16px 14px;overflow-y:auto}
#col-info::-webkit-scrollbar{width:3px}
#col-info::-webkit-scrollbar-thumb{background:var(--bdr)}
#inf-badge{display:inline-block;align-self:flex-start;padding:3px 10px;background:var(--act);color:#fff;font-size:10px;font-weight:800;letter-spacing:2px}
#inf-name{font-size:18px;font-weight:900;line-height:1.2;color:#fff}
#inf-group{font-size:11px;color:var(--c);font-weight:700;letter-spacing:1px}
#inf-thumb{width:100%;aspect-ratio:16/9;background:var(--bg);overflow:hidden;border-radius:2px;display:none}
#inf-thumb img{width:100%;height:100%;object-fit:cover}
#inf-desc{font-size:11px;color:var(--td);line-height:1.6}
/* estados */
.stbox{display:flex;flex-direction:column;align-items:center;justify-content:center;gap:10px;padding:60px 20px;color:var(--td);text-align:center;grid-column:1/-1}
.stbox .ico{font-size:32px;opacity:.2}
.stbox p{font-size:11px;letter-spacing:2px}
.spin{width:28px;height:28px;border:2px solid var(--bdr);border-top-color:var(--c);border-radius:50%;animation:sp .7s linear infinite}
@keyframes sp{to{transform:rotate(360deg)}}
/* toast */
#toast{position:fixed;bottom:16px;right:16px;z-index:9999;pointer-events:none;background:var(--bg3);border-left:3px solid var(--c);color:var(--t);padding:9px 16px;font-size:12px;letter-spacing:.5px;transform:translateY(50px);opacity:0;transition:.25s}
#toast.show{transform:none;opacity:1}
#toast.err{border-color:var(--acc);color:var(--acc)}
#toast.ok{border-color:var(--grn);color:var(--grn)}
@media(max-width:700px){html,body{overflow:auto;height:auto}#ws{position:static;overflow:visible;height:auto}#v-cats,#v-play{position:static}#v-play{flex-direction:column}#col-ch{width:100%;max-height:260px;border-right:none;border-bottom:1px solid var(--bdr2)}#col-info{width:100%;border-left:none;border-top:1px solid var(--bdr)}#pbox{max-height:none}#clock{display:none}}
</style>
</head>
<body>
<div id="bar">
  <div class="logo" onclick="showCats()">
    <svg width="28" height="28" viewBox="0 0 28 28" fill="none"><polygon points="14,2 26,8 26,20 14,26 2,20 2,8" fill="none" stroke="#00c8ff" stroke-width="1.5"/><polygon points="14,7 22,11 22,17 14,21 6,17 6,11" fill="rgba(0,200,255,.1)" stroke="#00c8ff" stroke-width="1"/><text x="14" y="18" text-anchor="middle" fill="#00c8ff" font-size="8" font-weight="bold" font-family="Arial">TV</text></svg>
    <span class="logo-t">TRON<b>IPTV</b></span>
  </div>
  <div id="bar-mode">AO VIVO</div>
  <div id="clock"></div>
  <button class="ibtn" onclick="toggleSbar()"><svg viewBox="0 0 24 24"><circle cx="11" cy="11" r="8"/><line x1="21" y1="21" x2="16.65" y2="16.65"/></svg></button>
  <button class="ibtn" onclick="logout()"><svg viewBox="0 0 24 24"><path d="M9 21H5a2 2 0 01-2-2V5a2 2 0 012-2h4"/><polyline points="16 17 21 12 16 7"/><line x1="21" y1="12" x2="9" y2="12"/></svg></button>
</div>
<div id="sbar"><input id="sinp" type="text" placeholder="🔍 Buscar canais, filmes ou séries..." oninput="gsearch(this.value)"><button onclick="toggleSbar()">✕</button></div>
<nav id="nav">
  <button class="tab on" data-s="live"   onclick="navTo('live')">📺 AO VIVO</button>
  <button class="tab"    data-s="movies" onclick="navTo('movies')">🎬 FILMES</button>
  <button class="tab"    data-s="series" onclick="navTo('series')">📂 SÉRIES</button>
  <button class="tab"    data-s="favs"   onclick="navTo('favs')">⭐ FAVORITOS</button>
</nav>
<div id="ws">
  <div id="v-cats">
    <div class="vch">SELECIONE UMA CATEGORIA</div>
    <div id="cat-grid"><div class="stbox"><div class="spin"></div><p>CARREGANDO...</p></div></div>
  </div>
  <div id="v-play">
    <div id="col-ch">
      <div id="chead">
        <button class="narr" onclick="prevCat()">&#8249;</button>
        <span id="chead-name">CATEGORIA</span>
        <button class="narr" onclick="nextCat()">&#8250;</button>
      </div>
      <div id="csrch-wrap"><input id="csrch" type="text" placeholder="🔍 Buscar..." oninput="filterList(this.value)"></div>
      <div id="chlist"></div>
    </div>
    <div id="col-mid">
      <div id="pbox">
        <video id="vid" controls autoplay playsinline></video>
        <div id="idle">
          <div class="idle-brand">
            <svg width="38" height="38" viewBox="0 0 28 28" fill="none"><polygon points="14,2 26,8 26,20 14,26 2,20 2,8" fill="none" stroke="#00c8ff" stroke-width="1.5"/><polygon points="14,7 22,11 22,17 14,21 6,17 6,11" fill="rgba(0,200,255,.1)" stroke="#00c8ff" stroke-width="1"/><text x="14" y="18" text-anchor="middle" fill="#00c8ff" font-size="8" font-weight="bold" font-family="Arial">TV</text></svg>
            <span class="idle-bt">TRON<b>IPTV</b></span>
          </div>
          <p>SELECIONE UM CANAL PARA ASSISTIR</p>
        </div>
      </div>
      <div id="qbar">
        <span class="qlbl">QUALIDADE</span>
        <button class="qb on" onclick="setQ('auto',this)">AUTO</button>
        <button class="qb"    onclick="setQ('sd',this)">SD</button>
        <button class="qb"    onclick="setQ('hd',this)">HD</button>
        <button class="qb"    onclick="setQ('fhd',this)">FULL HD</button>
        <button id="qfs" onclick="goFull()">⛶ TELA CHEIA</button>
      </div>
      <div id="eppanel">
        <div id="ephead"><span id="eptitle"></span><button id="epclose" onclick="closeEp()">✕ Fechar</button></div>
        <div id="epseasons"></div>
        <div id="eplist"></div>
      </div>
    </div>
    <div id="col-info">
      <div id="inf-badge">AO VIVO</div>
      <div id="inf-name">—</div>
      <div id="inf-group"></div>
      <div id="inf-thumb"></div>
      <div id="inf-desc"></div>
    </div>
  </div>
</div>
<div id="toast"></div>
<script>
'use strict';
const SS=(()=>{try{return JSON.parse(localStorage.getItem('tron_s')||'null')||JSON.parse(sessionStorage.getItem('tron_s')||'null');}catch{return null;}})();
if(!SS?.sv){location.replace('index.html');}
const {sv,us,pw}=SS;
const PX=[u=>u,u=>`https://api.allorigins.win/raw?url=${encodeURIComponent(u)}`,u=>`https://corsproxy.io/?url=${encodeURIComponent(u)}`,u=>`https://api.cors.lol/?url=${encodeURIComponent(u)}`];
let bpx=0;
async function api(action,extra=''){
  const raw=`${sv}/player_api.php?username=${us}&password=${pw}&action=${action}${extra}`;
  const ord=[bpx,...[0,1,2,3].filter(i=>i!==bpx)];
  for(const i of ord){try{const r=await fetch(PX[i](raw),{signal:AbortSignal.timeout(13000)});if(!r.ok)continue;const t=await r.text();if(!t?.trim())continue;const d=JSON.parse(t);bpx=i;return d;}catch(e){console.warn('px'+i,e.message);}}
  throw new Error('Servidor inacessível');
}
let sec='live',cats=[],streams=[],vcats=[],catIdx=-1,catItems=[],curUrl=null,hls=null,rtr=0,qm='auto',sbarOpen=false;
addEventListener('DOMContentLoaded',()=>{
  const cl=document.getElementById('clock');
  (function tick(){const n=new Date();cl.textContent=n.toLocaleTimeString('pt-BR',{hour:'2-digit',minute:'2-digit'})+'  ·  '+n.toLocaleDateString('pt-BR',{day:'2-digit',month:'short',year:'numeric'});setTimeout(tick,1000);})();
  navTo('live');
});
function toast(msg,cls=''){const el=document.getElementById('toast');el.textContent=msg;el.className='toast show '+cls;clearTimeout(el._t);el._t=setTimeout(()=>el.className='toast',3000);}
const gf=()=>{try{return JSON.parse(localStorage.getItem('tf')||'[]');}catch{return[];}};
const sf=a=>localStorage.setItem('tf',JSON.stringify(a));
const isf=id=>gf().some(x=>x._id===id);
function togFav(item){let f=gf(),i=f.findIndex(x=>x._id===item._id);if(i>=0){f.splice(i,1);sf(f);toast('Removido','err');return false;}f.push(item);sf(f);toast('⭐ Adicionado!','ok');return true;}
function toggleSbar(){sbarOpen=!sbarOpen;const sb=document.getElementById('sbar');sb.style.display=sbarOpen?'flex':'none';const sh=sbarOpen?46:0;document.getElementById('nav').style.top=(52+sh)+'px';document.getElementById('ws').style.top=(52+42+sh)+'px';if(sbarOpen){document.getElementById('sinp').value='';document.getElementById('sinp').focus();}}
function gsearch(q){q=q.trim();if(!q){showCats();return;}const r=streams.filter(s=>s.name.toLowerCase().includes(q.toLowerCase()));showPlay();document.getElementById('chead-name').textContent=`"${q}" — ${r.length} resultados`;catItems=r;catIdx=-1;renderList(r);}
function navTo(s){sec=s;document.querySelectorAll('.tab').forEach(b=>b.classList.toggle('on',b.dataset.s===s));document.getElementById('bar-mode').textContent=s==='live'?'AO VIVO':s==='movies'?'FILMES':s==='series'?'SÉRIES':'FAVORITOS';closeEp();if(s==='favs'){loadFavs();return;}loadSec(s);}
function showCats(){document.getElementById('v-cats').style.display='flex';document.getElementById('v-play').style.display='none';}
function showPlay(){document.getElementById('v-cats').style.display='none';document.getElementById('v-play').style.display='flex';}
async function loadSec(s){
  showCats();
  document.getElementById('cat-grid').innerHTML='<div class="stbox"><div class="spin"></div><p>CARREGANDO...</p></div>';
  try{
    const map={live:['get_live_categories','get_live_streams'],movies:['get_vod_categories','get_vod_streams'],series:['get_series_categories','get_series']};
    const [ca,sa]=map[s];
    const [cr,sr]=await Promise.all([api(ca),api(sa)]);
    cats=Array.isArray(cr)?cr:[];
    streams=buildStreams(sr,s);
    vcats=cats.filter(c=>streams.some(st=>st.cat===String(c.category_id)));
    renderCats();
    toast(`✅ ${streams.length} itens`,'ok');
  }catch(e){document.getElementById('cat-grid').innerHTML=`<div class="stbox"><div class="ico">⚠️</div><p>${esc(e.message)}</p></div>`;toast(e.message,'err');}
}
function buildStreams(raw,s){
  if(!Array.isArray(raw))return[];
  if(s==='live')return raw.map((c,i)=>({_id:'l_'+c.stream_id,num:i+1,type:'live',name:c.name||'—',url:`${sv}/live/${us}/${pw}/${c.stream_id}.m3u8`,img:c.stream_icon||'',cat:String(c.category_id||''),grp:c.category_name||''}));
  if(s==='movies')return raw.map((m,i)=>({_id:'m_'+m.stream_id,num:i+1,type:'movies',name:m.name||'—',url:`${sv}/movie/${us}/${pw}/${m.stream_id}.${m.container_extension||'mp4'}`,img:m.stream_icon||'',cat:String(m.category_id||''),grp:m.category_name||''}));
  return raw.map((x,i)=>({_id:'sr_'+x.series_id,num:i+1,type:'series',name:x.name||'—',url:null,img:x.cover||'',cat:String(x.category_id||''),grp:x.category_name||'',sid:x.series_id}));
}
function renderCats(){
  const g=document.getElementById('cat-grid');g.innerHTML='';
  const f=document.createDocumentFragment();
  const all=mcard('TODOS',streams.length);all.onclick=()=>openCat(-1,streams,'TODOS');f.appendChild(all);
  vcats.forEach((c,i)=>{const items=streams.filter(s=>s.cat===String(c.category_id));const card=mcard(c.category_name||'—',items.length);card.onclick=()=>openCat(i,items,c.category_name||'—');f.appendChild(card);});
  g.appendChild(f);
}
function mcard(name,count){const d=document.createElement('div');d.className='ccard';d.innerHTML=`<span class="ccard-n">${esc(name)}</span><span class="ccard-c">${count}</span>`;return d;}
function openCat(idx,items,name){catIdx=idx;catItems=items;showPlay();document.getElementById('chead-name').textContent=name;document.getElementById('csrch').value='';renderList(items);}
function prevCat(){if(catIdx<=0)return;catIdx--;const c=vcats[catIdx];openCat(catIdx,streams.filter(s=>s.cat===String(c.category_id)),c.category_name||'—');}
function nextCat(){if(catIdx>=vcats.length-1)return;catIdx++;const c=vcats[catIdx];openCat(catIdx,streams.filter(s=>s.cat===String(c.category_id)),c.category_name||'—');}
function filterList(q){const lq=q.toLowerCase();renderList(lq?catItems.filter(i=>i.name.toLowerCase().includes(lq)):catItems);}
function renderList(list){
  const el=document.getElementById('chlist');el.innerHTML='';
  if(!list.length){el.innerHTML='<div class="stbox"><div class="ico">🔍</div><p>VAZIO</p></div>';return;}
  const live=sec==='live',ser=sec==='series';
  const f=document.createDocumentFragment();
  list.forEach((item,i)=>{
    const d=document.createElement('div');
    d.className='ci'+(curUrl===item.url?' on':'');
    d.dataset.id=item._id;
    const ico=live?'📺':ser?'📂':'🎬';
    d.innerHTML=`<span class="ci-n">${item.num||i+1}</span><div class="ci-logo">${item.img?`<img src="${esc(item.img)}" loading="lazy" onerror="this.style.display='none'">`:`<span style="font-size:20px">${ico}</span>`}</div><div class="ci-info"><div class="ci-name">${esc(item.name)}</div><div class="ci-sub">${live?'Ao vivo':esc(item.grp||'')}</div></div><div class="ci-r">${live?'<div class="ldot"></div>':''}<button class="fvb ${isf(item._id)?'on':''}" onclick="hfav(event,'${esc(item._id)}')">⭐</button></div>`;
    d.addEventListener('click',e=>{
      if(e.target.classList.contains('fvb'))return;
      if(ser){openSeries(item);return;}
      document.querySelectorAll('.ci').forEach(x=>x.classList.remove('on'));
      d.classList.add('on');play(item);
    });
    f.appendChild(d);
  });
  el.appendChild(f);
}
function hfav(e,id){e.stopPropagation();const item=streams.find(i=>i._id===id)||gf().find(f=>f._id===id);if(!item)return;const on=togFav(item);e.currentTarget.classList.toggle('on',on);if(sec==='favs')loadFavs();}
function play(item){
  curUrl=item.url;
  document.getElementById('inf-badge').textContent=item.type==='live'?'AO VIVO':item.type==='movies'?'FILME':'SÉRIE';
  document.getElementById('inf-name').textContent=item.name;
  document.getElementById('inf-group').textContent=item.grp||'';
  document.getElementById('inf-desc').textContent='';
  const th=document.getElementById('inf-thumb');
  if(item.img&&item.type!=='live'){th.style.display='block';th.innerHTML=`<img src="${esc(item.img)}" onerror="this.parentElement.style.display='none'">`;}else th.style.display='none';
  playUrl(item.url,item.name,item.type==='live');
}
function playUrl(url,name,live){
  rtr=0;const v=document.getElementById('vid');
  document.getElementById('idle').style.display='none';
  if(hls){hls.destroy();hls=null;}
  if(url.includes('.m3u8')&&Hls.isSupported()){
    hls=new Hls({enableWorker:true});hls.loadSource(url);hls.attachMedia(v);
    hls.on(Hls.Events.MANIFEST_PARSED,(_,d)=>{applyQ(hls,d.levels);v.play().catch(()=>{});});
    hls.on(Hls.Events.ERROR,(_,d)=>{if(d.fatal&&curUrl===url){rtr++;if(rtr<=4){toast(`Reconectando ${rtr}/4…`,'err');setTimeout(()=>playUrl(url,name,live),rtr*2500);}else toast('Stream indisponível','err');}});
  }else{v.src=url;v.play().catch(()=>{});}
}
function applyQ(h,lvls){if(!lvls?.length||qm==='auto'){h.currentLevel=-1;return;}const s=[...lvls].map((l,i)=>({i,h:l.height||0})).sort((a,b)=>a.h-b.h);if(qm==='sd')h.currentLevel=s[0]?.i??-1;else if(qm==='hd')h.currentLevel=(s.find(l=>l.h>=720)||s[Math.floor(s.length/2)])?.i??-1;else h.currentLevel=(s.find(l=>l.h>=1080)||s[s.length-1])?.i??-1;}
function setQ(q,btn){qm=q;document.querySelectorAll('.qb').forEach(b=>b.classList.remove('on'));btn.classList.add('on');if(hls)applyQ(hls,hls.levels);toast('Qualidade: '+q.toUpperCase());}
function goFull(){const v=document.getElementById('vid');(v.requestFullscreen||v.webkitRequestFullscreen||v.mozRequestFullScreen).call(v);}
async function openSeries(item){
  document.querySelectorAll('.ci').forEach(x=>x.classList.remove('on'));
  document.querySelector(`.ci[data-id="${item._id}"]`)?.classList.add('on');
  document.getElementById('inf-badge').textContent='SÉRIE';
  document.getElementById('inf-name').textContent=item.name;
  document.getElementById('inf-group').textContent=item.grp||'';
  const th=document.getElementById('inf-thumb');
  if(item.img){th.style.display='block';th.innerHTML=`<img src="${esc(item.img)}" onerror="this.parentElement.style.display='none'">`;}else th.style.display='none';
  document.getElementById('eptitle').textContent=item.name;
  document.getElementById('epseasons').innerHTML='<div class="spin" style="margin:6px 14px"></div>';
  document.getElementById('eplist').innerHTML='';
  document.getElementById('eppanel').style.display='flex';
  try{
    const d=await api('get_series_info','&series_id='+item.sid);
    const ep=d.episodes||{};
    if(d.info?.plot)document.getElementById('inf-desc').textContent=d.info.plot;
    const ss=Object.keys(ep).sort((a,b)=>+a-+b);
    const sel=document.getElementById('epseasons');sel.innerHTML='';
    if(!ss.length){document.getElementById('eplist').innerHTML='<div class="stbox"><p>SEM EPISÓDIOS</p></div>';return;}
    ss.forEach((s,i)=>{const b=document.createElement('button');b.className='seabtn'+(i===0?' on':'');b.textContent='Temp. '+s;b.onclick=()=>{document.querySelectorAll('.seabtn').forEach(x=>x.classList.remove('on'));b.classList.add('on');renderEps(ep[s],item.name);};sel.appendChild(b);});
    renderEps(ep[ss[0]],item.name);
  }catch(e){document.getElementById('eplist').innerHTML=`<div class="stbox"><p>${esc(e.message)}</p></div>`;}
}
function renderEps(eps,sname){
  const el=document.getElementById('eplist');el.innerHTML='';
  if(!eps?.length){el.innerHTML='<div class="stbox"><p>VAZIO</p></div>';return;}
  const f=document.createDocumentFragment();
  eps.forEach(ep=>{
    const url=`${sv}/series/${us}/${pw}/${ep.id}.${ep.container_extension||'mkv'}`;
    const d=document.createElement('div');
    d.className='eprow'+(curUrl===url?' on':'');
    d.innerHTML=`<span class="epn">E${ep.episode_num}</span><span class="epname">${esc(ep.title||'Ep.'+ep.episode_num)}</span>${ep.info?.duration?`<span class="epdur">${esc(ep.info.duration)}</span>`:''}`;
    d.onclick=()=>{document.querySelectorAll('.eprow').forEach(x=>x.classList.remove('on'));d.classList.add('on');curUrl=url;document.getElementById('inf-name').textContent=sname+' · E'+ep.episode_num;document.getElementById('inf-desc').textContent=ep.info?.plot||'';playUrl(url,sname+' E'+ep.episode_num,false);};
    f.appendChild(d);
  });
  el.appendChild(f);
}
function closeEp(){document.getElementById('eppanel').style.display='none';}
function loadFavs(){const f=gf();streams=f;cats=[];vcats=[];showPlay();document.getElementById('chead-name').textContent='⭐ FAVORITOS';catItems=f;catIdx=-1;renderList(f);}
function logout(){localStorage.removeItem('tron_s');sessionStorage.removeItem('tron_s');if(hls)hls.destroy();location.href='index.html';}
function esc(s){return String(s||'').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');}
document.addEventListener('keydown',e=>{
  if(e.target.tagName==='INPUT')return;
  if(e.key===' '){const v=document.getElementById('vid');if(v.src){e.preventDefault();v.paused?v.play():v.pause();}}
  if(e.key==='f'||e.key==='F')goFull();
  if(e.key==='Escape'){closeEp();if(sbarOpen)toggleSbar();}
  if(e.key==='ArrowLeft')prevCat();
  if(e.key==='ArrowRight')nextCat();
});
</script>
</body>
</html>
